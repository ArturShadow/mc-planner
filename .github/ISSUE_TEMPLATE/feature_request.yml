name: Feature request
description: Propose an improvement or new capability for MC Planner.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem before prescribing an implementation. Search existing issues first so related proposals can stay together.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need, limitation, or opportunity should this address?
      placeholder: As a user, I need ... because ...
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result without requiring a specific implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain your preferred interaction or approach, if you have one.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches you considered.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the observable conditions that would make this request complete.
      placeholder: |
        - [ ] Users can ...
        - [ ] The application ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, links, constraints, or related issue numbers.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I searched for an existing request that covers the same need.
          required: true
        - label: This request describes one focused, independently deliverable outcome.
          required: true
